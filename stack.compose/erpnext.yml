services:
  erpnext-configurator:
    image: frappe/erpnext:v16.17.0
    container_name: erpnext-configurator
    restart: on-failure
    networks:
      - mariadb
      - valkey
      - erpnext-internal
    depends_on:
      mariadb:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      REDIS_CACHE: default:${VALKEY_ADMIN_PASSWORD}@valkey:6379/1
      REDIS_QUEUE: default:${VALKEY_ADMIN_PASSWORD}@valkey:6379/3
      SOCKETIO_PORT: 9000
      ERPNEXT_SITE_NAME: ${ERPNEXT_SITE_NAME:-erpnext.${DOMAIN}}
      ERPNEXT_HOST_URL: ${ERPNEXT_HOST_URL:-https://erpnext.${DOMAIN}}
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
      - ./configs/erpnext/configure-runtime.sh:/configure-runtime.sh:ro
    entrypoint: ["bash", "/configure-runtime.sh"]

  erpnext-bootstrap:
    image: frappe/erpnext:v16.17.0
    container_name: erpnext-bootstrap
    restart: on-failure
    networks:
      - caddy
      - mariadb
      - valkey
      - erpnext-internal
    depends_on:
      erpnext-configurator:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      MARIADB_ROOT_USERNAME: root
      MARIADB_ROOT_PASSWORD: ${MARIADB_ADMIN_PASSWORD}
      ERPNEXT_ADMIN_PASSWORD: ${STACK_ADMIN_PASSWORD}
      ERPNEXT_SITE_NAME: ${ERPNEXT_SITE_NAME:-erpnext.${DOMAIN}}
      ERPNEXT_HOST_URL: ${ERPNEXT_HOST_URL:-https://erpnext.${DOMAIN}}
      DOMAIN: ${DOMAIN}
      ERPNEXT_OAUTH_SECRET: ${ERPNEXT_OAUTH_SECRET:?ERPNEXT_OAUTH_SECRET is required}
      SSL_CERT_FILE: /ca/caddy-ca.crt
      REQUESTS_CA_BUNDLE: /ca/caddy-ca.crt
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
      - ./configs/erpnext/bootstrap-site.sh:/bootstrap-site.sh:ro
      - caddy_ca:/ca:ro
    entrypoint: ["bash", "/bootstrap-site.sh"]

  erpnext-backend:
    image: frappe/erpnext:v16.17.0
    container_name: erpnext-backend
    restart: unless-stopped
    networks:
      - caddy
      - mariadb
      - valkey
      - erpnext-internal
    depends_on:
      erpnext-bootstrap:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
      - caddy_ca:/ca:ro
    environment:
      SSL_CERT_FILE: /ca/caddy-ca.crt
      REQUESTS_CA_BUNDLE: /ca/caddy-ca.crt
    healthcheck:
      test:
        - CMD-SHELL
        - |
          curl -fsS -H "Host: ${ERPNEXT_SITE_NAME:-erpnext.${DOMAIN}}" http://127.0.0.1:8000/api/method/ping | grep -q '"pong"'
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s

  erpnext-websocket:
    image: frappe/erpnext:v16.17.0
    container_name: erpnext-websocket
    restart: unless-stopped
    networks:
      - valkey
      - erpnext-internal
    depends_on:
      erpnext-bootstrap:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    environment:
      FRAPPE_REDIS_CACHE: redis://default:${VALKEY_ADMIN_PASSWORD}@valkey:6379/1
      FRAPPE_REDIS_QUEUE: redis://default:${VALKEY_ADMIN_PASSWORD}@valkey:6379/3
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"open('/proc/1/cmdline','rb').read()\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  erpnext-queue-short:
    image: frappe/erpnext:v16.17.0
    container_name: erpnext-queue-short
    restart: unless-stopped
    networks:
      - mariadb
      - valkey
      - erpnext-internal
    depends_on:
      erpnext-bootstrap:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      FRAPPE_REDIS_CACHE: redis://default:${VALKEY_ADMIN_PASSWORD}@valkey:6379/1
      FRAPPE_REDIS_QUEUE: redis://default:${VALKEY_ADMIN_PASSWORD}@valkey:6379/3
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    command: bench worker --queue short,default
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"open('/proc/1/cmdline','rb').read()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  erpnext-queue-long:
    image: frappe/erpnext:v16.17.0
    container_name: erpnext-queue-long
    restart: unless-stopped
    networks:
      - mariadb
      - valkey
      - erpnext-internal
    depends_on:
      erpnext-bootstrap:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      FRAPPE_REDIS_CACHE: redis://default:${VALKEY_ADMIN_PASSWORD}@valkey:6379/1
      FRAPPE_REDIS_QUEUE: redis://default:${VALKEY_ADMIN_PASSWORD}@valkey:6379/3
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    command: bench worker --queue long,default,short
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"open('/proc/1/cmdline','rb').read()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  erpnext-scheduler:
    image: frappe/erpnext:v16.17.0
    container_name: erpnext-scheduler
    restart: unless-stopped
    networks:
      - mariadb
      - valkey
      - erpnext-internal
    depends_on:
      erpnext-bootstrap:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    command: bench schedule
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"open('/proc/1/cmdline','rb').read()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  erpnext:
    image: frappe/erpnext:v16.17.0
    container_name: erpnext
    restart: unless-stopped
    networks:
      - caddy
      - erpnext-internal
    depends_on:
      erpnext-bootstrap:
        condition: service_completed_successfully
      erpnext-backend:
        condition: service_healthy
      erpnext-websocket:
        condition: service_healthy
    environment:
      BACKEND: erpnext-backend:8000
      SOCKETIO: erpnext-websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER:-$$host}
      UPSTREAM_REAL_IP_ADDRESS: ${UPSTREAM_REAL_IP_ADDRESS:-127.0.0.1}
      UPSTREAM_REAL_IP_HEADER: ${UPSTREAM_REAL_IP_HEADER:-X-Forwarded-For}
      UPSTREAM_REAL_IP_RECURSIVE: ${UPSTREAM_REAL_IP_RECURSIVE:-off}
      PROXY_READ_TIMEOUT: ${PROXY_READ_TIMEOUT:-120}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-50m}
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    command: nginx-entrypoint.sh
    healthcheck:
      test:
        - CMD-SHELL
        - |
          curl -fsS -H "Host: ${ERPNEXT_SITE_NAME:-erpnext.${DOMAIN}}" http://127.0.0.1:8080/api/method/ping | grep -q '"pong"'
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s

volumes:
  erpnext_sites:
  erpnext_logs:

networks:
  caddy: {}
  mariadb: {}
  valkey: {}
  erpnext-internal:
    driver: bridge
    internal: true
